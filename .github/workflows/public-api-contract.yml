name: Public API Contract

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-api-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libasound2-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python -m pip install -e .

      - name: Regenerate OpenAPI artifact
        run: python scripts/export_openapi.py

      - name: Verify committed OpenAPI artifact is current
        run: git diff --exit-code docs/openapi/clipmato-v1.openapi.json

      - name: Run public API contract tests
        run: pytest -q tests/test_api_contracts.py

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipmato-public-api-openapi
          path: docs/openapi/clipmato-v1.openapi.json
