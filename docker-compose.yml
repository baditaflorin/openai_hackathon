services:
  clipmato:
    build:
      context: .
      args:
        INSTALL_LOCAL_WHISPER: "${CLIPMATO_INSTALL_LOCAL_WHISPER:-true}"
    image: clipmato:0.3.0
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "${CLIPMATO_PORT:-8000}:8000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      CLIPMATO_DATA_DIR: /data
      CLIPMATO_TRANSCRIPTION_BACKEND: "${CLIPMATO_TRANSCRIPTION_BACKEND:-local-whisper}"
      CLIPMATO_CONTENT_BACKEND: "${CLIPMATO_CONTENT_BACKEND:-ollama}"
      CLIPMATO_LOCAL_WHISPER_MODEL: "${CLIPMATO_LOCAL_WHISPER_MODEL:-base}"
      CLIPMATO_LOCAL_WHISPER_DEVICE: "${CLIPMATO_LOCAL_WHISPER_DEVICE:-auto}"
      CLIPMATO_OLLAMA_BASE_URL: "${CLIPMATO_OLLAMA_BASE_URL:-http://ollama:11434}"
      CLIPMATO_OLLAMA_MODEL: "${CLIPMATO_OLLAMA_MODEL:-gpt-oss:20b}"
      CLIPMATO_OLLAMA_TIMEOUT_SECONDS: "${CLIPMATO_OLLAMA_TIMEOUT_SECONDS:-120}"
      CLIPMATO_OPENAI_CONTENT_MODEL: "${CLIPMATO_OPENAI_CONTENT_MODEL:-openai-agents-default}"
      CLIPMATO_BASE_URL: "${CLIPMATO_BASE_URL:-http://localhost:8000}"
      CLIPMATO_PUBLISH_POLL_SECONDS: "${CLIPMATO_PUBLISH_POLL_SECONDS:-15}"
      CLIPMATO_PUBLISH_MAX_ATTEMPTS: "${CLIPMATO_PUBLISH_MAX_ATTEMPTS:-3}"
      CLIPMATO_PUBLISH_RETRY_SECONDS: "${CLIPMATO_PUBLISH_RETRY_SECONDS:-300}"
      CLIPMATO_YOUTUBE_PRIVACY_STATUS: "${CLIPMATO_YOUTUBE_PRIVACY_STATUS:-private}"
      CLIPMATO_HOST: 0.0.0.0
      CLIPMATO_PORT: 8000
    volumes:
      - clipmato_data:/data
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    restart: unless-stopped
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      CLIPMATO_OLLAMA_MODEL: "${CLIPMATO_OLLAMA_MODEL:-gpt-oss:20b}"
    entrypoint:
      - /bin/sh
      - -lc
      - >
        for i in $(seq 1 30); do
          ollama list >/dev/null 2>&1 && break;
          sleep 2;
        done;
        if ollama list | awk 'NR>1 {print $1}' | grep -Fx "$${CLIPMATO_OLLAMA_MODEL}" >/dev/null 2>&1; then
          echo "Ollama model $${CLIPMATO_OLLAMA_MODEL} already cached";
        else
          ollama pull "$${CLIPMATO_OLLAMA_MODEL}";
        fi
    restart: "no"

volumes:
  clipmato_data:
  ollama_data:
